version: '3.8'

services:
  # 商品登録ツール (F101-F106)
  product-registration:
    build:
      context: ./product-registration-tool
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL:-mock-store.myshopify.com}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN:-mock-token}
      - SHOPIFY_API_VERSION=2024-01
      - NEXT_PUBLIC_TAG_SYSTEM_URL=http://localhost:3001
      - SHOPIFY_API_ENDPOINT=http://shopify-mock:4000
    volumes:
      - ./product-registration-tool:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - shopify-mock
    networks:
      - app-network
    command: npm run dev

  # タグ生成・印刷システム (F201-F205)
  tag-generation:
    build:
      context: ./tag-generation-system
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL:-mock-store.myshopify.com}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN:-mock-token}
      - SHOPIFY_API_VERSION=2024-01
      - NEXT_PUBLIC_STORE_DOMAIN=${SHOPIFY_STORE_URL:-mock-store.myshopify.com}
      - SHOPIFY_API_ENDPOINT=http://shopify-mock:4000
      - PRINTER_IP_ADDRESS=${PRINTER_IP_ADDRESS:-192.168.1.100}
    volumes:
      - ./tag-generation-system:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - shopify-mock
    networks:
      - app-network
    command: npm run dev

  # オンラインカート生成ツール (F301-F305)
  online-cart:
    build:
      context: ./online-cart-tool
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL:-mock-store.myshopify.com}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN:-mock-token}
      - SHOPIFY_API_VERSION=2024-01
      - SHOPIFY_STOREFRONT_TOKEN=${SHOPIFY_STOREFRONT_TOKEN:-mock-storefront-token}
      - SHOPIFY_API_ENDPOINT=http://shopify-mock:4000
      - NEXT_PUBLIC_WEBSOCKET_URL=http://localhost:3002
    volumes:
      - ./online-cart-tool:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - shopify-mock
    networks:
      - app-network
    command: npm run dev

  # Shopify APIモックサーバー
  shopify-mock:
    build:
      context: ./dev-tools/shopify-mock
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
    volumes:
      - ./dev-tools/shopify-mock:/app
      - /app/node_modules
      - ./dev-tools/mock-data:/app/data
    networks:
      - app-network
    command: npm run dev

  # PostgreSQL (開発用データストア)
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=85store
      - POSTGRES_PASSWORD=dev-password
      - POSTGRES_DB=85store_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./dev-tools/db-init:/docker-entrypoint-initdb.d
    networks:
      - app-network

  # Redis (セッション管理・キャッシュ)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  # Mailhog (開発用メールサーバー)
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge
